name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run tsc --noEmit

      - name: Build vslsp binary
        run: bun build --compile --minify vslsp.ts --outfile vslsp

      - name: Build vslsp-mcp binary
        run: bun build --compile --minify mcp.ts --outfile vslsp-mcp

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build CodeMapper
        run: dotnet publish tools/code-mapper/CodeMapper.csproj -c Release -o tools/code-mapper/publish
